<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="grad-INTP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#grad-INTP)" />

  <!-- Subtle pattern overlay -->
  <rect width="1200" height="630" fill="rgba(255,255,255,0.03)" />
  <circle cx="1050" cy="120" r="200" fill="rgba(255,255,255,0.05)" />
  <circle cx="150" cy="500" r="150" fill="rgba(255,255,255,0.05)" />

  <!-- Emoji -->
  <text x="600" y="200" font-size="100" text-anchor="middle" dominant-baseline="central">💡</text>

  <!-- MBTI Type Code -->
  <text x="600" y="320" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="120" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="central" letter-spacing="12">INTP</text>

  <!-- Nickname -->
  <text x="600" y="410" font-family="'Helvetica Neue', Arial, sans-serif" font-size="36" fill="rgba(255,255,255,0.9)" text-anchor="middle" dominant-baseline="central">논리적인 사색가</text>

  <!-- Divider line -->
  <line x1="450" y1="470" x2="750" y2="470" stroke="rgba(255,255,255,0.3)" stroke-width="1" />

  <!-- Branding -->
  <text x="600" y="530" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" fill="rgba(255,255,255,0.6)" text-anchor="middle" dominant-baseline="central">나의 MBTI 테스트</text>
</svg>